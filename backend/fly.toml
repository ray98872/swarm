# Fly.io configuration for the Swarm backend.
# Free-tier friendly: one always-on shared-cpu-1x VM with 256MB RAM.
# Rename `app` if "swarm-backend" is already taken in your Fly org.

app = "swarm-backend"
primary_region = "lhr"   # London — closest to ray98872.github.io's likely audience

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  # GROQ_API_KEY is set as a secret, never committed:  fly secrets set GROQ_API_KEY=...

[http_service]
  internal_port = 8080
  force_https = true
  # Always-on: do NOT spin down to zero, so the demo never cold-starts.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpus = 1
